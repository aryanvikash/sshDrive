name: Release

# Tag a commit to cut a release, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:        # also allow manual runs from the Actions tab

permissions:
  contents: write           # needed to create the release and upload assets

jobs:
  release:
    name: Build & upload DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build DMG
        run: |
          chmod +x build.sh make-dmg.sh
          ./make-dmg.sh

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: Shell Drive.dmg
          draft: false
          generate_release_notes: true
