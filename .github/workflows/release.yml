name: Release

# Tag a commit to cut a release, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:        # run from the Actions tab on the main branch
    inputs:
      version:
        description: 'Release tag to create (e.g. v1.0.0)'
        required: true
        default: v1.0.0

permissions:
  contents: write           # needed to create the release, tag, and assets

jobs:
  release:
    name: Build & upload DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build DMG
        run: |
          chmod +x build.sh make-dmg.sh
          ./make-dmg.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # Tag push → use the pushed tag. Manual run → create the given tag
          # on the checked-out commit (the branch you ran it from, e.g. main).
          tag_name: ${{ inputs.version || github.ref_name }}
          files: Shell Drive.dmg
          draft: false
          generate_release_notes: true
